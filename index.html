26s ease\">\n        <div style=\"width:40px;height:4.5px;border-radius:3px;background:#D5D5D5;margin:8px auto 0\"><\u002Fdiv>\n        <div style=\"padding:10px 16px 12px;border-bottom:1px solid #EBEBEB\">\n          <div style=\"display:flex;align-items:flex-start;gap:8px\">\n            <div style=\"flex:1\">\n              <div style=\"display:flex;align-items:center;gap:7px\">\n                <span style=\"font-size:9.5px;font-weight:700;letter-spacing:.7px;padding:3px 7px;border-radius:4px;background:#EDF1F6;color:#1E3348\">VIDEO<\u002Fspan>\n                <span style=\"font-size:12px;color:#6F6F6F\">{{ vidCh }} · {{ vidDur }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"font-size:16.5px;font-weight:700;color:#222222;margin-top:6px;line-height:1.3\">{{ vidTitle }}<\u002Fdiv>\n            <\u002Fdiv>\n            <button onclick=\"{{ closeVid }}\" aria-label=\"Close\" style=\"width:32px;height:32px;border-radius:50%;background:#F2F2F2;border:0;font-size:14px;color:#555555;flex-shrink:0\" style-focus=\"outline:2px solid #0B66C3\">✕<\u002Fbutton>\n          <\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:8px;margin-top:10px;background:#F3FAF6;border:1px solid #CFE7DC;border-radius:10px;padding:8px 11px\">\n            <span style=\"position:relative;font-size:16px;color:#D9D9D9;letter-spacing:1.5px;line-height:1\">★★★★★<span style=\"position:absolute;left:0;top:0;overflow:hidden;white-space:nowrap;color:#0E7A4E;width:{{ vidRatePct }}\">★★★★★<\u002Fspan><\u002Fspan>\n            <span style=\"font-size:15px;font-weight:700;color:#0E7A4E\">{{ vidRateVal }}/5<\u002Fspan>\n            <span style=\"font-size:12px;color:#2E5A45\">reviewer's overall score<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"overflow-y:auto;padding:14px 16px 8px;flex:1\">\n          <div style=\"font-size:14px;font-weight:700;color:#222222\">What the reviewer liked<\u002Fdiv>\n          <sc-for list=\"{{ vidPros } background:rgba(18,26,36,.94);color:#FFFFFF;font-size:13px;line-height:1.4;padding:10px 16px;border-radius:12px;z-index:60;animation:toastUp .2s ease;max-width:320px;text-align:center;pointer-events:none\">{{ toastMsg }}<\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n\n  <div data-screen-label=\"Reviewer guide\" style=\"width:470px;height:844px;background:#FBFBF8;border-radius:22px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 26px 80px rgba(0,0,0,.5)\">\n    <div style=\"padding:18px 20px 16px;background:#16405F;color:#FFFFFF;flex-shrink:0\">\n      <div style=\"font-size:10px;font-weight:700;letter-spacing:1.2px;opacity:.72\">PROTOTYPE GUIDE<\u002Fdiv>\n      <div style=\"font-size:21px;font-weight:900;margin-top:5px;line-height:1.2\">What to look at, and why<\u002Fdiv>\n      <div style=\"font-size:12.5px;line-height:1.5;opacity:.86;margin-top:6px\">The phone on the left is live. Tap <b>Try it<\u002Fb> on any card and the phone jumps to that spot. Each note says, in plain words, why it is there, what it could improve, and how the number behind it is worked out.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"flex:1;overflow-y:auto;padding:16px 18px 26px\">\n      <div style=\"font-size:11px;font-weight:700;letter-spacing:1px;color:#0E7A4E\">THE BIG IDEA<\u002Fdiv>\n      <div style=\"border:1px solid #E4E4E0;border-radius:14px;background:#FFFFFF;padding:13px 14px;margin-top:10px\">\n        <div style=\"font-size:12.5px;line-height:1.55;color:#333333\">{{ guideIntro }}<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:10px;margin-top:12px\">\n          <sc-for list=\"{{ guideVoices }}\" as=\"v\" hint-placeholder-count=\"3\">\n            <div style=\"display:flex;gap:9px\">\n              <span style=\"font-size:9px;font-weight:700;letter-spacing:.5px;padding:3px 0;border-radius:4px;background:{{ v.bg }};color:{{ v.fg }};flex-shrink:0;width:60px;text-align:center;height:fit-content\">{{ v.tag }}<\u002Fspan>\n              <div style=\"flex:1\">\n                <div style=\"font-size:12.5px;line-height:1.45;color:#333333\">{{ v.what }}<\u002Fdiv>\n                <div style=\"font-size:11.5px;line-height:1.4;color:#6F6F6F;margin-top:3px\"><b style=\"color:#0E7A4E;font-weight:700\">Where:<\u002Fb> {{ v.where }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n          <div style=\"font-size:12px;line-height:1.5;color:#555555;background:#F6F7F5;border:1px solid #ECEDE8;border-radius:8px;padding:9px 11px;margin-top:2px\">{{ guideMeet }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"font-size:11px;font-weight:700;letter-spacing:1px;color:#0E7A4E;margin-top:22px\">GUIDED TOUR<\u002Fdiv>\n      <sc-for list=\"{{ guideStops }}\" as=\"s\" hint-placeholder-count=\"7\">\n        <div style=\"border:1px solid #E4E4E0;border-radius:14px;background:#FFFFFF;padding:13px 14px;margin-top:10px\">\n          <div style=\"display:flex;align-items:center;gap:9px\">\n            <span style=\"width:24px;height:24px;border-radius:50%;background:#16405F;color:#FFFFFF;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0\">{{ s.n }}<\u002Fspan>\n            <span style=\"font-size:15.5px;font-weight:700;color:#222222;flex:1;line-height:1.25\">{{ s.t }}<\u002Fspan>\n            <button onclick=\"{{ s.onTry }}\" style=\"flex-shrink:0;height:30px;padding:0 13px;border-radius:99px;background:#0E7A4E;border:0;color:#FFFFFF;font-size:12.5px;font-weight:700\" style-focus=\"outline:2px solid #16405F;outline-offset:2px\">{{ s.tryT }} ›<\u002Fbutton>\n          <\u002Fdiv>\n          <div style=\"margin-top:11px;display:flex;flex-direction:column;gap:8px\">\n            <div style=\"display:flex;gap:8px\"><span style=\"font-size:9px;font-weight:700;letter-spacing:.5px;color:#6F6F6F;width:56px;flex-shrink:0;padding-top:2px\">WHY<\u002Fspan><span style=\"font-size:12.5px;line-height:1.45;color:#333333;flex:1\">{{ s.why }}<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;gap:8px\"><span style=\"font-size:9px;font-weight:700;letter-spacing:.5px;color:#0E7A4E;width:56px;flex-shrink:0;padding-top:2px\">MOVES<\u002Fspan><span style=\"font-size:12.5px;line-height:1.45;color:#0B5E3C;font-weight:700;flex:1\">{{ s.moves }}<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;gap:8px\"><span style=\"font-size:9px;font-weight:700;letter-spacing:.5px;color:#0A57A5;width:56px;flex-shrink:0;padding-top:2px\">LOGIC<\u002Fspan><span style=\"font-size:12.5px;line-height:1.45;color:#333333;flex:1\">{{ s.logic }}<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;gap:8px\"><span style=\"font-size:9px;font-weight:700;letter-spacing:.5px;color:#8A6100;width:56px;flex-shrink:0;padding-top:2px\">EMPATHY<\u002Fspan><span style=\"font-size:12.5px;line-height:1.45;color:#333333;flex:1\">{{ s.ux }}<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n\n      <div style=\"font-size:11px;font-weight:700;letter-spacing:1px;color:#0E7A4E;margin-top:22px\">A CALL I'M PROUD OF<\u002Fdiv>\n      <div style=\"border:1px solid #CFE7DC;background:#F3FAF6;border-radius:14px;padding:13px 14px;margin-top:10px\">\n        <div style=\"font-size:12.5px;line-height:1.55;color:#2E5A45\">{{ guideCredit }}<\u002Fdiv>\n        <div style=\"font-size:12.5px;line-height:1.55;color:#2E5A45;margin-top:9px;padding-top:9px;border-top:1px solid #D8EBE1\">{{ guideShortlist }}<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"font-size:11px;font-weight:700;letter-spacing:1px;color:#0E7A4E;margin-top:22px\">WHAT I LEFT OUT, ON PURPOSE<\u002Fdiv>\n      <div style=\"font-size:12px;line-height:1.45;color:#6F6F6F;margin-top:6px\">Deciding what to leave out mattered as much as what to add. A few spots where I held back, and why:<\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:9px;margin-top:10px\">\n        <sc-for list=\"{{ guideOmit }}\" as=\"o\" hint-placeholder-count=\"6\">\n          <div style=\"display:flex;gap:9px\"><span style=\"color:#B4791A;flex-shrink:0;font-weight:700;font-size:14px;line-height:1.35\">×<\u002Fspan><span style=\"font-size:12.5px;line-height:1.45;color:#4A4A4A\">{{ o }}<\u002Fspan><\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <div style=\"border-top:1px solid #E4E4E0;margin-top:22px;padding-top:14px\">\n        <div style=\"font-size:13px;font-weight:700;color:#222222\">How it all fits together<\u002Fdiv>\n        <div style=\"font-size:12.5px;line-height:1.55;color:#555555;margin-top:6px\">Looking at the car stays the main job. Reviews show up only where a buyer is already thinking about that thing, and only when there is real data to show. Every number is either a percentage or a score out of 5, and each one traces back to a count you can check. The AI only helps word things and answer questions. It never makes a number up.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:460,&quot;height&quot;:920},&quot;pulseEnabled&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Pulse layer&quot;},&quot;brandName&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Carwale&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Branding&quot;},&quot;defaultLens&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;all&quot;,&quot;city&quot;,&quot;family&quot;,&quot;highway&quot;,&quot;first&quot;],&quot;default&quot;:&quot;all&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Pulse layer&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    this.state = {\n      ready: false, hero: 0, heart: false, descOpen: false, active: 'overview',  put one line of reassurance right next to the price, where people worry most.',\n        moves: 'More enquiries, because buyers feel surer at the point of doubt.',\n        logic: 'From a short owner survey: how many said the car met or beat what they expected, out of everyone who answered. It only shows once enough people have replied.',\n        ux: 'It answers the quiet “will I regret this?” at the moment it comes up.' },\n      { n: 3, t: 'Expert-vs-owner gap', tryT: 'Open the gap', onTry: () => this.tourGo('gap'),\n        why: 'Experts give it 4.0 and owners give it 4.5. Rather than hide that, I put the reason one tap away.',\n        moves: 'More trust, and people read further down the page.',\n        logic: 'I flag the topics where the two scores are furthest apart, then explain each one with real quotes.',\n        ux: 'Owning the disagreement reads as more honest than pretending it away.' },\n      { n: 4, t: 'Section-specific insight', tryT: 'Open Seats photos', onTry: () => this.tourGo('seats'),\n        why: 'When you are looking at the seats, you see what owners say about the seats, not a random review.',\n        moves: 'More people use the gallery and find the details that matter to them.',\n        logic: 'I match reviews to each part by keyword. If a part has no reviews yet, I say so plainly.',\n        ux: 'The tip fits what is on screen, and I never invent one to fill the space.' },\n      { n: 5, t: 'Aspect explorer + lenses', tryT: 'Open Overview', onTry: () => this.tourGo('overview'),\n        why: 'A short, honest list of what owners love and complain about. You pick how you’ll use the car and the list narrows to match, and a small chart shows whether people still like it years later.',\n        moves: 'Longer, more engaged visits and quicker shortlisting.',\n        logic: 'A nightly job tags each review to a topic, a use case, and an ownership stage using keyword rules and a small trained classifier, then saves the positive share per buck
