document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

iv style=\"flex:1\">\n                <div style=\"font-size:12.5px;line-height:1.45;color:#333333\">{{ v.what }}<\u002Fdiv>\n                <div style=\"font-size:11.5px;line-height:1.4;color:#6F6F6F;margin-top:3px\"><b style=\"color:#0E7A4E;font-weight:700\">Where:<\u002Fb> {{ v.where }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n          <div style=\"font-size:12px;line-height:1.5;color:#555555;background:#F6F7F5;border:1px solid #ECEDE8;border-radius:8px;padding:9px 11px;margin-top:2px\">{{ guideMeet }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"font-size:11px;font-weight:700;letter-spacing:1px;color:#0E7A4E;margin-top:22px\">GUIDED TOUR<\u002Fdiv>\n      <sc-for list=\"{{ guideStops }}\" as=\"s\" hint-placeholder-count=\"7\">\n        <div style=\"border:1px solid #E4E4E0;border-radius:14px;background:#FFFFFF;padding:13px 14px;margin-top:10px\">\n          <div style=\"display:flex;align-items:center;gap:9px\">\n            <span style=\"width:24px;height:24px;border-radius:50%;background:#16405F;color:#FFFFFF;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0\">{{ s.n }}<\u002Fspan>\n            <span style=\"font-size:15.5px;font-weight:700;color:#222222;flex:1;line-height:1.25\">{{ s.t }}<\u002Fspan>\n            <button onclick=\"{{ s.onTry }}\" style=\"flex-shrink:0;height:30px;padding:0 13px;border-radius:99px;background:#0E7A4E;border:0;color:#FFFFFF;font-size:12.5px;font-weight:700\" style-focus=\"outline:2px solid #16405F;outline-offset:2px\">{{ s.tryT }} ›<\u002Fbutton>\n          <\u002Fdiv>\n          <div style=\"margin-top:11px;display:flex;flex-direction:column;gap:8px\">\n            <div style=\"display:flex;gap:8px\"><span style=\"font-size:9px;font-weight:700;letter-spacing:.5px;color:#6F6F6F;width:56px;flex-shrink:0;padding-top:2px\">WHY<\u002Fspan><span style=\"font-size:12.5px;line-height:1.45;color:#333333;flex:1\">{{ s.why }}<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;gap:8px\"><span style=\"font-size:9px;font-weight:700;letter-spacing:.5px;color:#0E7A4E;width:56px;flex-shrink:0;padding-top:2px\">MOVES<\u002Fspan><span style=\"font-size:12.5px;line-height:1.45;color:#0B5E3C;font-weight:700;flex:1\">{{ s.moves }}<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;gap:8px\"><span style=\"font-size:9px;font-weight:700;letter-spacing:.5px;color:#0A57A5;width:56px;flex-shrink:0;padding-top:2px\">LOGIC<\u002Fspan><span style=\"font-size:12.5px;line-height:1.45;color:#333333;flex:1\">{{ s.logic }}<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;gap:8px\"><span style=\"font-size:9px;font-weight:700;letter-spacing:.5px;color:#8A6100;width:56px;flex-shrink:0;padding-top:2px\">EMPATHY<\u002Fspan><span style=\"font-size:12.5px;line-height:1.45;color:#333333;flex:1\">{{ s.ux }}<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n\n      <div style=\"font-size:11px;font-weight:700;letter-spacing:1px;color:#0E7A4E;margin-top:22px\">A CALL I'M PROUD OF<\u002Fdiv>\n      <div style=\"border:1px solid #CFE7DC;background:#F3FAF6;border-radius:14px;padding:13px 14px;margin-top:10px\">\n        <div style=\"font-size:12.5px;line-height:1.55;color:#2E5A45\">{{ guideCredit }}<\u002Fdiv>\n        <div style=\"font-size:12.5px;line-height:1.55;color:#2E5A45;margin-top:9px;padding-top:9px;border-top:1px solid #D8EBE1\">{{ guideShortlist }}<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"font-size:11px;font-weight:700;letter-spacing:1px;color:#0E7A4E;margin-top:22px\">WHAT I LEFT OUT, ON PURPOSE<\u002Fdiv>\n      <div style=\"font-size:12px;line-height:1.45;color:#6F6F6F;margin-top:6px\">Deciding what to leave out mattered as much as what to add. A few spots where I held back, and why:<\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:9px;margin-top:10px\">\n        <sc-for list=\"{{ guideOmit }}\" as=\"o\" hint-placeholder-count=\"6\">\n          <div style=\"display:flex;gap:9px\"><span style=\"color:#B4791A;flex-shrink:0;font-weight:700;font-size:14px;line-height:1.35\">×<\u002Fspan><span style=\"font-size:12.5px;line-height:1.45;color:#4A4A4A\">{{ o }}<\u002Fspan><\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <div style=\"border-top:1px solid #E4E4E0;margin-top:22px;padding-top:14px\">\n        <div style=\"font-size:13px;font-weight:700;color:#222222\">How it all fits together<\u002Fdiv>\n        <div style=\"font-size:12.5px;line-height:1.55;color:#555555;margin-top:6px\">Looking at the car stays the main job. Reviews show up only where a buyer is already thinking about that thing, and only when there is real data to show. Every number is either a percentage or a score out of 5, and each one traces back to a count you can check. The AI only helps word things and answer questions. It never makes a number up.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:460,&quot;height&quot;:920},&quot;pulseEnabled&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Pulse layer&quot;},&quot;brandName&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Carwale&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Branding&quot;},&quot;defaultLens&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;all&quot;,&quot;city&quot;,&quot;family&quot;,&quot;highway&quot;,&quot;first&quot;],&quot;default&quot;:&quot;all&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Pulse layer&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    this.state = {\n      ready: false, hero: 0, heart: false, descOpen: false, active: 'overview',\n      pill: 'pros', fuel: 'Petrol', lens: (props && props.defaultLens) || 'all', tenure: 'y1', aspAll: false,\n      genTab: 'new', sort: 'latest', topic: null, expanded: {}, gapOpen: {},\n      vFuel: null, vTrans: null, compare: {},\n      galleryOn: false, galTab: 'All', galCat: 'outer', galDescOpen: false, gapSheet: false,\n      ttkTab: 'highlights', vidSheet: null,\n      sheet: null, lightbox: null, debug: false, settings: false, keyDraft: '', hasKey: false,\n      toastOn: false, toastMsg: '', askQ: '', ask: { st: 'idle' }, askFb: null\n    };\n    this.D = null; this.events = {}; this.embeds = null; this.spyLock = 0; this.key = '';\n    this.scRef = React.createRef(); this.heroRef = React.createRef(); this.navRef = React.createRef(); this.priceRef = React.createRef();\n    this.secs = {}; this.order = ['overview', 'view360', 'variants', 'expert', 'reviews', 'ask', 'videos'];\n    this.secRefs = {};\n    this.order.forEach((k) => { this.secRefs[k] = (el) => { this.secs[k] = el; }; });\n  }\n\n  componentDidMount() {\n    try { this.key = localStorage.getItem('pulse_gemini_key') || ''; } catch (e) { this.key = ''; }\n    import((window.__resources && window.__resources.dataJs) || './baleno-data.js').then((m) => {\n      this.D = m.DATA;\n      this.setState({ ready: true, hasKey: !!this.key });\n      this.log('pulse_gallery_impression', { slide: 1 });\n    }).catch((e) => { console.error('Pulse data failed to load', e); });\n    if (!this.rm()) {\n      this._heroTimer = setInterval(() => {\n        const el = this.heroRef.current;\n        if (!el) return;\n        const S = this.state;\n        if (S.galleryOn || S.sheet || S.vidSheet || S.gapSheet || S.settings || S.lightbox) return;\n        if (document.hidden) return;\n        const n = ((S.hero || 0) + 1) % 4;\n        el.scrollTo({ left: n * 390, behavior: 'smooth' });\n      }, 3000);\n    }\n  }\n  componentWillUnmount() { clearInterval(this._heroTimer); clearTimeout(this._tt); clearTimeout(this. eetGalleryCat('seats'), 360); }); this.log('gallery_open', { via: 'guide', tab: 'Interior' }); return; }\n    if (target === 'video') { this.setState({ ...reset, vidSheet: this.D ? this.D.videos[0] : null }); this.log('video_summary_open', { via: 'guide' }); return; }\n    this.setState(reset, () => { this.go(target); });\n  }\n\n  openGallery(tab) {\n    this.log('gallery_open', { tab: tab });\n    let cat = this.state.galCat;\n    if (this.D && this.D.galleryScreen.tabCats[tab]) cat = this.D.galleryScreen.tabCats[tab][0];\n    this.setState({ galleryOn: true, galTab: tab, galCat: cat, galDescOpen: false });\n  }\n  galSetTab(tab) {\n    if (tab === 'Baleno') { this.setState({ galleryOn: false }); return; }\n    this.log('gallery_tab', { tab: tab });\n    let cat = this.state.galCat;\n    const cats = this.D && this.D.galleryScreen.tabCats[tab];\n    if (cats && cats.indexOf(cat) === -1) cat = cats[0];\n    this.setState({ galTab: tab, galCat: cat });\n  }\n\n  sheetGalleryCat(catKey) {\n    if (!this.D) return;\n    const cat = this.D.galleryScreen.cats[catKey]; if (!cat) return;\n    const ids = (cat.ins && cat.ins.quotes) || [];\n    const qs = ids.map((id) => this.D.corpus.find((x) => x.id === id)).filter(Boolean);\n    this.openSheet({ kind: 'gallerycat', key: catKey, title: cat.label, meta: 'What owners say about the ' + cat.label.toLowerCase(), pct: null, quotes: qs, hi: null });\n  }\n\n  hash(s) { let h = 0; for (let i = 0; i < s.length; i++) { h = (h * 31 + s.charCodeAt(i)) | 0; } return 'v2_' + h; }\n  async ensureEmbeds(key) {\n    if (this.embeds) return this.embeds;\n    const docs = this.D.corpus;\n    const hv = this.hash(docs.map((d) => d.id + d.text.length).join('|'));\n    try {\n      const c = JSON.parse(localStorage.getItem('pulse_embeds') || 'null');\n      if (c && c.hash === hv && Array.isArray(c.vecs) && c.vecs.length === docs.length) { this.embeds = c.vecs; return c.vecs; }\n    } catch (e) {}\n    const body = {\n      requests: docs.map hrow new Error('The model returned an empty answer, please retry.');\n      this.setState({ ask: { st: 'answer', q: q, segs: this.parseAns(txt), meta: 'Answered by ' + MODEL.split('/').pop() + ' from ' + top.length + ' retrieved sources' } });\n    } catch (err) {\n      const fb = this.D.fallbacks.find((f) => f.q === q);\n      if (fb) { this.setState({ ask: { st: 'answer', q: q, segs: this.parseAns(fb.a), meta: 'Offline answer from the seeded sources' } }); }\n      else { this.setState({ ask: { st: 'error', q: q, err: String((err && err.message) || err) } }); }\n    }\n  }\n\n  renderVals() {\n    const S = this.state, D = this.D;\n    const A = '#0E7A4E';\n    const pulseOn = this.props.pulseEnabled === undefined ? true : !!this.props.pulseEnabled && this.props.pulseEnabled !== 'false';\n    const chipS = (on) => ({ b: on ? '1.6px solid #0E7A4E' : '1px solid #9B9B9B', fg: on ? A : '#333333', fw: on ? 700 : 400 });\n    const badgeC = (src) => src === 'owner' ? { bBg: '#E7F4EE', bFg: '#0B5E3C', badge: 'OWNER' } : src === 'expert' ? { bBg: '#EAF2FB', bFg: '#0A57A5', badge: 'EXPERT' } : { bBg: '#EDF1F6', bFg: '#1E3348', badge: 'VIDEO' };\n    const tone = (t) => t === 'teal' ? { chipBg: '#E7F4EE', chipFg: '#0B5E3C', chipBd: '#CFE7DC' } : { chipBg: '#F2F2F2', chipFg: '#6F6F6F', chipBd: '#E0E0E0' };\n    const tagLabels = { design: 'looks', mileage: 'mileage', rearseat: 'comfort', cabin: 'build quality', amt: 'amt', boot: 'boot space', cng: 'cng', service: 'service', citydrive: 'city drive', noise: 'noise', highway: 'highway', safety: 'safety', infotainment: 'infotainment', tall: 'tall drivers' };\n    const navLabels = { overview: 'Overview', view360: '360° View', variants: 'Variants', expert: 'Expert Opinion', reviews: 'User Reviews', videos: 'Videos', ask: 'Ask AI' };\n\n    const slides = (D ? D.slides : []).map((s) => ({ ...s, slotId: 'hero-' + s.kind, ph: 'Drop Baleno photo — ' + s.label }));\n    const gRaw = D ? D.gallery[S.hero] : null;\n    const gc = gRaw or exceeded expectations” line is my own call. Zomato did something similar when it dropped the star rating on individual dishes and showed how often a dish gets reordered instead, because a reorder is the signal that actually matters to a food buyer. For a car, “did it live up to what I hoped” is that signal. One honest number does more work than a wall of sub-ratings.';\n    const guideShortlist = 'The “12,400 shortlisted this week” line on the photo is live social proof. On a site with Carwale’s traffic and a car as popular as the Baleno, a weekly shortlist count in the low tens of thousands is realistic, and it nudges a fence-sitter far better than another rating does.';\n    const guideOmit = [\n      'No reviews on the hero. People open the page to see the car, so the top stays clean.',\n      'No rating stamped on every photo. Just one short owner note per section, and only where real reviews exist.',\n      'No mention counts sprinkled through Pros and Cons. They sit behind a tap for anyone who wants them.',\n      'No second scale. Everything is a percentage or a score out of 5, so nothing competes with the main rating.',\n      'No made-up insight for parts nobody reviewed, like the headlights. It simply says there is nothing yet.',\n      'The expert-versus-owner gap is one tap off the rating, not a big block down the page.'\n    ];\n    const guideStops = [\n      { n: 1, t: 'Images-first hero', tryT: 'Show hero', onTry: () => this.tourGo('top'),\n        why: 'People come to look at the car first, so I kept the top of the page all photos, with nothing layered on them.',\n        moves: 'Fewer people leave early, and more scroll into the details.',\n        logic: 'I kept it to just the photo carousel; the slots hold real dealer or owner pictures.',\n        ux: 'It gives people what they came for before asking them to read anything.' },\n      { n: 2, t: '“91% met expectations”', tryT: 'Jump to price', onTry: () => this.tourGo('price'),\n        why: 'I put one line of reassurance right next to the price, where people worry most.',\n        moves: 'More enquiries, because buyers feel surer at the point of doubt.',\n        logic: 'From a short owner survey: how many said the car met or beat what they expected, out of everyone who answered. It only shows once enough people have replied.',\n        ux: 'It answers the quiet “will I regret this?” at the moment it comes up.' },\n      { n: 3, t: 'Expert-vs-owner gap', tryT: 'Open the gap', onTry: () => this.tourGo('gap'),\n        why: 'Experts give it 4.0 and owners give it 4.5. Rather than hide that, I put the reason one tap away.',\n        moves: 'More trust, and people read further down the page.',\n        logic: 'I flag the topics where the two scores are furthest apart, then explain each one with real quotes.',\n        ux: 'Owning the disagreement reads as more honest than pretending it away.' },\n      { n: 4, t: 'Section-specific insight', tryT: 'Open Seats photos', onTry: () => this.tourGo('seats'),\n        why: 'When you are looking at the seats, you see what owners say about the seats, not a random review.',\n        moves: 'More people use the gallery and find the details that matter to them.',\n        logic: 'I match reviews to each part by keyword. If a part has no reviews yet, I say so plainly.',\n        ux: 'The tip fits what is on screen, and I never invent one to fill the space.' },\n      { n: 5, t: 'Aspect explorer + lenses', tryT: 'Open Overview', onTry: () => this.tourGo('overview'),\n        why: 'A short, honest list of what owners love and complain about. You pick how you’ll use the car and the list narrows to match, and a small chart shows whether people still like it years later.',\n        moves: 'Longer, more engaged visits and quicker shortlisting.',\n        logic: 'A nightly job tags each review to a topic, a use case, and an ownership stage using keyword rules and a small trained classifier, then saves the positive share per buck
